name: Build Python APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install Buildozer dependencies (fixed for Ubuntu 24.04)
      run: |
        pip install buildozer cython
        
        sudo apt-get update
        # جایگزین libtinfo5 با libtinfo6
        sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev
    
    - name: Build APK
      run: |
        buildozer init
        # اصلاح buildozer.spec برای Ubuntu 24.04
        sed -i 's/ndk = .*/ndk = 23b/g' buildozer.spec
        sed -i 's/sdk = .*/sdk = 30/g' buildozer.spec
        buildozer android debug deploy run
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: rug-reader-apk
        path: bin/*.apk
