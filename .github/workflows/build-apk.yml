name: Build APK with Docker

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kivy/buildozer:latest
      
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Build APK with Buildozer (force root)
      run: |
        # اگر فایل spec وجود نداشت، بساز
        if [ ! -f "buildozer.spec" ]; then
          buildozer init
        fi
        
        # تنظیمات لازم
        sed -i 's/requirements = .*/requirements = python3,kivy==2.2.1,openpyxl==3.1.2/g' buildozer.spec
        sed -i 's/package.name = .*/package.name = rugreader/g' buildozer.spec
        sed -i 's/package.domain = .*/package.domain = org.example/g' buildozer.spec
        sed -i 's/android.permissions = .*/android.permissions = READ_EXTERNAL_STORAGE/g' buildozer.spec
        sed -i 's/android.api = .*/android.api = 30/g' buildozer.spec
        sed -i 's/android.minapi = .*/android.minapi = 21/g' buildozer.spec
        sed -i 's/android.ndk = .*/android.ndk = 23b/g' buildozer.spec
        
        # غیرفعال کردن چک روت با متغیر محیطی
        export BUILDOZER_NON_INTERACTIVE=1
        export BUILDOZER_ROOT_IGNORE=1
        
        # ساخت APK
        printf 'y\n' | buildozer -v android debug
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: rug-reader-apk
        path: bin/*.apk
