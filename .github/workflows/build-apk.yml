name: Build APK with Docker

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kivy/buildozer:latest
      
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Force accept Android SDK licenses
      run: |
        mkdir -p /github/home/.android
        touch /github/home/.android/repositories.cfg
        mkdir -p /github/home/.buildozer/android/platform/android-sdk/licenses
        yes | /github/home/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager --sdk_root=/github/home/.buildozer/android/platform/android-sdk --licenses || true
    
    - name: Build APK
      run: |
        if [ ! -f "buildozer.spec" ]; then
          buildozer init
        fi
        sed -i "s/requirements = .*/requirements = python3,kivy==2.2.1,openpyxl==3.1.2/g" buildozer.spec
        sed -i "s/package.name = .*/package.name = rugreader/g" buildozer.spec
        sed -i "s/package.domain = .*/package.domain = org.example/g" buildozer.spec
        sed -i "s/android.permissions = .*/android.permissions = READ_EXTERNAL_STORAGE/g" buildozer.spec
        sed -i "s/android.api = .*/android.api = 30/g" buildozer.spec
        sed -i "s/android.minapi = .*/android.minapi = 21/g" buildozer.spec
        sed -i "s/android.ndk = .*/android.ndk = 23b/g" buildozer.spec
        sed -i "s/android.accept_sdk_license = .*/android.accept_sdk_license = True/g" buildozer.spec
        export BUILDOZER_NON_INTERACTIVE=1
        export BUILDOZER_ROOT_IGNORE=1
        printf 'y\n' | buildozer -v android debug
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: rug-reader-apk
        path: bin/*.apk
