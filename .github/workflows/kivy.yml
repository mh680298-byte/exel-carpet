name: Build Kivy Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      # Force python-for-android to use NDK r25b (required!)
      ANDROID_NDK_HOME: /home/runner/.buildozer/android/platform/android-ndk-r25b
      ANDROID_NDK_ROOT: /home/runner/.buildozer/android/platform/android-ndk-r25b
      ANDROID_NDK: /home/runner/.buildozer/android/platform/android-ndk-r25b

    steps:

      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: "17"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            zip unzip git python3 python3-pip openjdk-17-jdk \
            automake autoconf libtool m4
          
          # Remove GitHub’s preinstalled NDK to avoid conflict with r25b
          sudo rm -rf /usr/local/lib/android/sdk/ndk/*

          pip install --upgrade pip
          pip install buildozer cython

      - name: Build APK
        run: |
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CarpetMap-APK
          path: bin/*.apk
