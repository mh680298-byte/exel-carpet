name: Build APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip openjdk-17-jdk zip unzip

      - name: Install Buildozer
        run: |
          python3 -m pip install --upgrade pip
          pip install buildozer cython

      - name: Install Android SDK manually (prevent SDK version issues)
        run: |
          # Create Android SDK root directory
          mkdir -p $HOME/android-sdk/cmdline-tools
          
          # Download command-line tools
          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          
          # Extract into a temporary folder to prevent structure issues
          unzip commandlinetools-linux-11076708_latest.zip -d $HOME/android-sdk/cmdline-tools-temp
          
          # Move extracted files to correct location
          mkdir -p $HOME/android-sdk/cmdline-tools/latest
          mv $HOME/android-sdk/cmdline-tools-temp/*/* $HOME/android-sdk/cmdline-tools/latest/
          
          # Clean up temporary folder
          rm -rf $HOME/android-sdk/cmdline-tools-temp
          
          # Accept all licenses and install required SDK components
          yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=$HOME/android-sdk --licenses
          yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=$HOME/android-sdk "platform-tools" "build-tools;33.0.0" "platforms;android-33"

      - name: Build APK
        env:
          ANDROIDSDK: $HOME/android-sdk
          ANDROIDMINAPI: 21
          ANDROIDAPI: 33
          ANDROIDNDK: 25b
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          export PATH=$ANDROID_HOME/platform-tools:$PATH
          buildozer android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
