name: Build Kivy APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk libffi-dev libssl-dev

    - name: Install Buildozer + Cython (compatible versions)
      run: |
        pip install --upgrade pip
        pip install buildozer
        pip install "Cython==0.29.36"
        pip install "setuptools==68.2.2"

    - name: Create .buildozer directory
      run: mkdir -p .buildozer

    - name: Build APK
      run: |
        buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: CarpetMap-APK
        path: .buildozer/android/platform/build-arm64-v8a/dists/*/*.apk
