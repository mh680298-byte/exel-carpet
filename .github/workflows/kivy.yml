name: Build Kivy APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # 🧱 نصب جاوای درست (Java 17 برای Gradle 8 و Android 8 plugin)
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      # 📦 نصب Buildozer و وابستگی‌ها
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            zip unzip git python3 python3-pip openjdk-17-jdk
          pip install --upgrade pip
          pip install buildozer cython

      # 🛠️ بیلد اپلیکیشن Kivy
      - name: Build with Buildozer
        run: |
          buildozer android debug

      # 📤 خروجی APK در artifacts برای دانلود مستقیم از GitHub Actions
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: kivy-apk
          path: bin/*.apk
